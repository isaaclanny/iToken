<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<title>iToken</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #312e81 100%);
    min-height: 100vh;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    overflow-x: hidden;
  }
  
  .container {
    width: 100%;
    max-width: 420px;
    margin-top: 20px;
  }
  
  .header {
    text-align: center;
    margin-bottom: 30px;
  }
  
  .header .logo {
    font-size: 48px;
    margin-bottom: 10px;
    animation: pulse 2s infinite;
  }
  
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.1); opacity: 0.8; }
  }
  
  .header h1 {
    font-size: 24px;
    font-weight: 700;
    background: linear-gradient(90deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;    background-clip: text;
  }
  
  .header p {
    font-size: 13px;
    color: #94a3b8;
    margin-top: 5px;
  }
  
  .card {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 24px;
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  }
  
  .timer-section {
    text-align: center;
    margin-bottom: 24px;
  }
  
  .timer-label {
    font-size: 12px;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 12px;
  }
  
  .timer-circle {
    position: relative;
    width: 140px;
    height: 140px;
    margin: 0 auto;
  }
  
  .timer-circle svg {
    transform: rotate(-90deg);
    width: 140px;
    height: 140px;
  }
  
  .timer-circle circle {
    fill: none;
    stroke-width: 8;
  }  
  .timer-bg { stroke: rgba(255, 255, 255, 0.1); }
  
  .timer-progress {
    stroke: url(#gradient);
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear;
  }
  
  .timer-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 32px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  
  .timer-text small {
    font-size: 12px;
    color: #94a3b8;
    display: block;
    margin-top: 2px;
    font-weight: 400;
  }
  
  .token-section {
    margin-bottom: 20px;
  }
  
  .token-label {
    font-size: 12px;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  
  .status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 10px #22c55e;
    animation: blink 1.5s infinite;    margin-right: 6px;
  }
  
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  
  .token-display {
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(96, 165, 250, 0.3);
    border-radius: 16px;
    padding: 20px 16px;
    font-family: 'Courier New', monospace;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 2px;
    text-align: center;
    word-break: break-all;
    color: #60a5fa;
    transition: all 0.3s;
    min-height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .token-display.refreshing {
    animation: flash 0.6s;
  }
  
  @keyframes flash {
    0% { background: rgba(96, 165, 250, 0.3); }
    100% { background: rgba(0, 0, 0, 0.4); }
  }
  
  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  
  .btn {
    padding: 16px;
    border: none;
    border-radius: 16px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s;
    font-family: inherit;
  }
  
  .btn:active { transform: scale(0.96); }
  
  .btn-primary {
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    color: #fff;
    box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
  }
  
  .btn-secondary {
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
    border: 1px solid rgba(255, 255, 255, 0.15);
  }
  
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  
  .info-item {
    background: rgba(255, 255, 255, 0.03);
    border-radius: 12px;
    padding: 14px;
    text-align: center;
  }
  
  .info-item .label {
    font-size: 10px;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  
  .info-item .value {
    font-size: 15px;
    font-weight: 600;
    margin-top: 4px;
    color: #e2e8f0;
    font-variant-numeric: tabular-nums;
  }
  
  .toast {    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: rgba(34, 197, 94, 0.95);
    color: #fff;
    padding: 12px 24px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 600;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    transition: transform 0.3s;
    z-index: 100;
  }
  
  .toast.show { transform: translateX(-50%) translateY(0); }
  
  .footer {
    text-align: center;
    margin-top: 20px;
    font-size: 11px;
    color: #64748b;
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo">🔐</div>
    <h1>iToken</h1>
    <p>Token seguro renovado a cada hora</p>
  </div>

  <div class="card">
    <div class="timer-section">
      <div class="timer-label">Próximo token em</div>
      <div class="timer-circle">
        <svg>
          <defs>
            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#60a5fa"/>
              <stop offset="100%" stop-color="#a78bfa"/>
            </linearGradient>
          </defs>
          <circle class="timer-bg" cx="70" cy="70" r="62"/>
          <circle class="timer-progress" cx="70" cy="70" r="62"
                  stroke-dasharray="389.56" stroke-dashoffset="0" id="progress"/>
        </svg>
        <div class="timer-text">          <span id="countdown">00:00</span>
          <small>minutos</small>
        </div>
      </div>
    </div>

    <div class="token-section">
      <div class="token-label">
        <span><span class="status-dot"></span>Token Ativo</span>
        <span id="tokenAge">0s</span>
      </div>
      <div class="token-display" id="tokenDisplay">Gerando...</div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" onclick="copyToken()">
        📋 Copiar
      </button>
      <button class="btn btn-secondary" onclick="generateNow()">
        🔄 Forçar
      </button>
    </div>
  </div>

  <div class="card">
    <div class="info-grid">
      <div class="info-item">
        <div class="label">Algoritmo</div>
        <div class="value">SHA-256</div>
      </div>
      <div class="info-item">
        <div class="label">Intervalo</div>
        <div class="value">1 hora</div>
      </div>
      <div class="info-item">
        <div class="label">Gerado em</div>
        <div class="value" id="generatedAt">--:--</div>
      </div>
      <div class="info-item">
        <div class="label">Expira em</div>
        <div class="value" id="expiresAt">--:--</div>
      </div>
    </div>
  </div>

  <div class="footer">
    Tokens gerados localmente • Nenhum dado enviado
  </div>
</div>
<div class="toast" id="toast">✓ Token copiado!</div>

<script>
  let currentToken = '';
  let currentHourKey = '';
  const CIRCUMFERENCE = 2 * Math.PI * 62; // ~389.56

  // Gera um seed determinístico baseado na hora atual + uma chave secreta
  function getHourKey() {
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();
    const day = now.getDate();
    const hour = now.getHours();
    // Chave "secreta" da aplicação (em produção, usar backend)
    const secret = 'APP_SECRET_KEY_2026';
    return `${secret}_${year}_${month}_${day}_${hour}`;
  }

  // Hash SHA-256 via Web Crypto API
  async function sha256(message) {
    const msgBuffer = new TextEncoder().encode(message);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  }

  // Formata o token em grupos legíveis
  function formatToken(hash) {
    const upper = hash.toUpperCase().substring(0, 24);
    return upper.match(/.{1,6}/g).join('-');
  }

  async function generateToken() {
    const hourKey = getHourKey();
    if (hourKey === currentHourKey && currentToken) return;
    
    currentHourKey = hourKey;
    const hash = await sha256(hourKey);
    currentToken = formatToken(hash);
    
    const display = document.getElementById('tokenDisplay');
    display.classList.remove('refreshing');
    void display.offsetWidth; // reflow
    display.classList.add('refreshing');
    display.textContent = currentToken;
    
    updateTimes();
  }
  function generateNow() {
    currentHourKey = '';
    generateToken();
  }

  function updateTimes() {
    const now = new Date();
    const expires = new Date(now);
    expires.setHours(expires.getHours() + 1, 0, 0, 0);
    
    document.getElementById('generatedAt').textContent = 
      now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('expiresAt').textContent = 
      expires.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }

  function updateCountdown() {
    const now = new Date();
    const nextHour = new Date(now);
    nextHour.setHours(nextHour.getHours() + 1, 0, 0, 0);
    
    const totalSeconds = 3600;
    const remainingMs = nextHour - now;
    const remainingSeconds = Math.floor(remainingMs / 1000);
    
    const minutes = Math.floor(remainingSeconds / 60);
    const seconds = remainingSeconds % 60;
    
    document.getElementById('countdown').textContent = 
      `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    
    // Atualiza idade do token
    const elapsed = totalSeconds - remainingSeconds;
    if (elapsed < 60) {
      document.getElementById('tokenAge').textContent = `${elapsed}s`;
    } else {
      document.getElementById('tokenAge').textContent = `${Math.floor(elapsed/60)}min`;
    }
    
    // Atualiza círculo de progresso
    const progress = remainingSeconds / totalSeconds;
    const offset = CIRCUMFERENCE * (1 - progress);
    document.getElementById('progress').style.strokeDashoffset = offset;
    
    // Se chegou a hora cheia, regenera o token
    if (remainingSeconds === 0) {
      currentHourKey = '';
      generateToken();
    }
  }
  async function copyToken() {
    try {
      await navigator.clipboard.writeText(currentToken);
      showToast('✓ Token copiado!');
    } catch (e) {
      // Fallback para dispositivos antigos
      const textarea = document.createElement('textarea');
      textarea.value = currentToken;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
      showToast('✓ Token copiado!');
    }
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  // Inicialização
  generateToken();
  updateCountdown();
  setInterval(updateCountdown, 1000);
  setInterval(generateToken, 5000); // Verifica a cada 5s se mudou a hora
</script>

</body>
</html>
